<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APK Building — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--g:#16a34a;--gd:#15803d;--gl:#22c55e;--gx:#dcfce7;--gp:#f0fdf4;--t:#111827;--t2:#374151;--mu:#6b7280;--bd:#e5e7eb;--w:#fff;--red:#ef4444;--blue:#3b82f6;--yw:#f59e0b}
body{font-family:'Nunito',sans-serif;background:#f1f5f9;color:var(--t);min-height:100vh}
/* LAYOUT */
.admin-shell{display:flex;min-height:100vh}
.sidebar{width:220px;background:#1f2937;color:#fff;flex-shrink:0;display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:40}
.sidebar-logo{padding:20px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,.1)}
.sidebar-logo-icon{font-size:1.4rem}
.sidebar-logo-name{font-size:1rem;font-weight:900}
.sidebar-logo-badge{font-size:.6rem;font-family:'DM Mono',monospace;background:var(--red);padding:2px 6px;border-radius:4px;margin-left:4px}
.sidebar-nav{flex:1;padding:12px 8px;display:flex;flex-direction:column;gap:2px;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;transition:all .15s;color:rgba(255,255,255,.7);font-size:.82rem;font-weight:700;border:none;background:transparent;width:100%;text-align:left}
.nav-item:hover{background:rgba(255,255,255,.08);color:#fff}
.nav-item.active{background:var(--g);color:#fff}
.nav-icon{font-size:1rem;width:20px;text-align:center}
.sidebar-footer{padding:12px 8px;border-top:1px solid rgba(255,255,255,.1)}
.sidebar-user{display:flex;align-items:center;gap:8px;padding:10px 12px;font-size:.75rem;color:rgba(255,255,255,.7)}
.sidebar-user-avatar{width:32px;height:32px;border-radius:50%;background:var(--g);display:flex;align-items:center;justify-content:center;font-weight:900;flex-shrink:0}
/* MAIN */
.admin-main{margin-left:220px;flex:1;display:flex;flex-direction:column}
.admin-topbar{background:#fff;border-bottom:1px solid var(--bd);padding:14px 24px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:30}
.admin-page-title{font-size:1.1rem;font-weight:900;flex:1}
.admin-search{border:1.5px solid var(--bd);border-radius:8px;padding:8px 14px;font-family:'Nunito',sans-serif;font-size:.85rem;outline:none;width:220px;transition:border-color .2s}
.admin-search:focus{border-color:var(--g)}
.admin-body{padding:24px;flex:1}
/* KPI CARDS */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
.kpi-card{background:#fff;border:1.5px solid var(--bd);border-radius:14px;padding:18px;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.kpi-val{font-size:2rem;font-weight:900;margin-bottom:4px}
.kpi-label{font-size:.72rem;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.04em}
.kpi-change{font-size:.72rem;font-weight:800;margin-top:6px}
.kpi-change.up{color:var(--g)}.kpi-change.down{color:var(--red)}
/* TABLES */
.table-card{background:#fff;border:1.5px solid var(--bd);border-radius:14px;overflow:hidden;margin-bottom:20px}
.table-header{padding:16px 20px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.table-title{font-size:.9rem;font-weight:900}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{padding:12px 16px;text-align:left;font-size:.72rem;font-weight:900;color:var(--mu);text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid var(--bd);background:#f9fafb}
td{padding:14px 16px;font-size:.82rem;border-bottom:1px solid var(--bd);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#f9fafb}
.td-name{font-weight:800}
.td-email{color:var(--mu);font-family:'DM Mono',monospace;font-size:.75rem}
.badge{font-size:.65rem;font-weight:800;padding:3px 8px;border-radius:100px;text-transform:uppercase}
.badge-green{background:var(--gx);color:var(--gd)}
.badge-red{background:#fee2e2;color:#b91c1c}
.badge-blue{background:#dbeafe;color:#1e40af}
.badge-yellow{background:#fef3c7;color:#92400e}
.badge-gray{background:#f3f4f6;color:var(--mu)}
.td-actions{display:flex;gap:6px}
.ta-btn{padding:4px 10px;border-radius:6px;font-family:'Nunito',sans-serif;font-size:.72rem;font-weight:800;cursor:pointer;border:1.5px solid var(--bd);background:#fff;color:var(--t2);transition:all .15s}
.ta-btn:hover{border-color:var(--g);color:var(--g)}
.ta-btn.danger:hover{border-color:var(--red);color:var(--red)}
/* CHARTS */
.charts-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px}
.chart-card{background:#fff;border:1.5px solid var(--bd);border-radius:14px;padding:20px}
.chart-title{font-size:.85rem;font-weight:900;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.bar-chart{display:flex;flex-direction:column;gap:10px}
.bar-item{display:flex;align-items:center;gap:10px}
.bar-label{font-size:.72rem;font-weight:700;color:var(--t2);width:80px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-wrap{flex:1;height:10px;background:#f3f4f6;border-radius:100px;overflow:hidden}
.bar-fill{height:100%;border-radius:100px;background:linear-gradient(90deg,var(--g),var(--gl));transition:width .5s}
.bar-val{font-size:.72rem;font-weight:800;color:var(--mu);width:32px;text-align:right;flex-shrink:0}
/* ACTIVITY */
.activity-list{display:flex;flex-direction:column;gap:0}
.activity-item{display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid var(--bd)}
.activity-item:last-child{border-bottom:none}
.activity-dot{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.9rem;flex-shrink:0}
.activity-dot.green{background:var(--gx)}
.activity-dot.blue{background:#dbeafe}
.activity-dot.red{background:#fee2e2}
.activity-dot.yellow{background:#fef3c7}
.activity-text{flex:1;font-size:.82rem;line-height:1.5}
.activity-time{font-size:.68rem;color:var(--mu);font-family:'DM Mono',monospace;flex-shrink:0}
/* SECTION TABS */
.section-tabs{display:flex;gap:0;border-bottom:2px solid var(--bd);margin-bottom:20px}
.section-tab{padding:10px 18px;font-size:.82rem;font-weight:800;color:var(--mu);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s;border:none;background:transparent}
.section-tab.active{color:var(--g);border-bottom-color:var(--g)}
.tab-content{display:none}
.tab-content.active{display:block}
/* MODAL */
.modal-o{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:center;justify-content:center;backdrop-filter:blur(3px)}
.modal-o.open{display:flex}
.modal{background:#fff;border-radius:16px;padding:24px;width:90%;max-width:500px;max-height:85vh;overflow-y:auto}
.modal h3{font-size:1rem;font-weight:900;margin-bottom:6px}
.modal p{font-size:.82rem;color:var(--mu);margin-bottom:16px}
.field{margin-bottom:14px}
.field label{display:block;font-size:.72rem;font-weight:800;color:var(--t2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.03em}
.field input,.field select,.field textarea{width:100%;border:1.5px solid var(--bd);border-radius:8px;padding:10px 12px;font-size:.85rem;font-family:'Nunito',sans-serif;outline:none;transition:border-color .2s}
.field input:focus,.field select:focus{border-color:var(--g)}
.modal-btns{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px}
.mbtn{padding:10px 18px;border-radius:8px;font-family:'Nunito',sans-serif;font-size:.82rem;font-weight:800;cursor:pointer;border:none;transition:all .2s}
.mbtn-g{background:var(--g);color:#fff}.mbtn-g:hover{background:var(--gd)}
.mbtn-w{background:#f3f4f6;color:var(--t2)}
.mbtn-r{background:var(--red);color:#fff}
/* LOADING */
.loading-row{text-align:center;padding:40px;color:var(--mu);font-size:.85rem}
/* STAT MINI */
.stat-mini-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.stat-mini{background:#fff;border:1.5px solid var(--bd);border-radius:10px;padding:12px 16px;font-size:.82rem;font-weight:700;display:flex;align-items:center;gap:8px}
.stat-mini-icon{font-size:1.1rem}
/* TOAST */
.toast{position:fixed;bottom:20px;right:20px;background:#1f2937;color:#fff;padding:10px 18px;border-radius:100px;font-size:.8rem;font-weight:700;z-index:999;opacity:0;transition:all .3s;pointer-events:none}
.toast.show{opacity:1}
.toast.ok{background:var(--g)}.toast.err{background:var(--red)}
/* RESPONSIVE */
@media(max-width:900px){.kpi-row{grid-template-columns:1fr 1fr}.charts-row{grid-template-columns:1fr}}
@media(max-width:600px){.sidebar{display:none}.admin-main{margin-left:0}.kpi-row{grid-template-columns:1fr 1fr}.admin-search{width:140px}}
</style>
</head>
<body>
<div class="toast" id="toast"></div>

<!-- MODAL: User detail -->
<div class="modal-o" id="userModal">
  <div class="modal">
    <h3 id="uModalTitle">Détails utilisateur</h3>
    <p id="uModalEmail"></p>
    <div id="uModalBody"></div>
    <div class="modal-btns">
      <button class="mbtn mbtn-r" id="uBanBtn">🚫 Suspendre</button>
      <button class="mbtn mbtn-g" id="uPlanBtn">⬆️ Passer Pro</button>
      <button class="mbtn mbtn-w" onclick="closeModal('userModal')">Fermer</button>
    </div>
  </div>
</div>

<!-- MODAL: App detail -->
<div class="modal-o" id="appModal">
  <div class="modal">
    <h3 id="aModalTitle">Détails de l'application</h3>
    <p id="aModalSub"></p>
    <div id="aModalBody"></div>
    <div class="modal-btns">
      <button class="mbtn mbtn-r" id="aDelBtn">🗑 Supprimer</button>
      <button class="mbtn mbtn-g" id="aFeatBtn">⭐ Mettre en avant</button>
      <button class="mbtn mbtn-w" onclick="closeModal('appModal')">Fermer</button>
    </div>
  </div>
</div>

<!-- MODAL: Send notif -->
<div class="modal-o" id="notifModal">
  <div class="modal">
    <h3>📣 Envoyer une notification</h3>
    <p>Envoie un message à tous les utilisateurs ou à un segment.</p>
    <div class="field"><label>Titre</label><input id="notifTitle" placeholder="Titre de la notification"></div>
    <div class="field"><label>Message</label><textarea id="notifMsg" style="min-height:80px" placeholder="Corps du message..."></textarea></div>
    <div class="field"><label>Segment</label><select id="notifSeg"><option value="all">Tous les utilisateurs</option><option value="free">Plan gratuit</option><option value="pro">Plan Pro</option><option value="inactive">Inactifs (30j)</option></select></div>
    <div class="modal-btns">
      <button class="mbtn mbtn-g" onclick="sendNotif()">Envoyer</button>
      <button class="mbtn mbtn-w" onclick="closeModal('notifModal')">Annuler</button>
    </div>
  </div>
</div>

<div class="admin-shell">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-icon">📱</div>
      <div>
        <div class="sidebar-logo-name">APK Building<span class="sidebar-logo-badge">ADMIN</span></div>
      </div>
    </div>
    <div class="sidebar-nav">
      <button class="nav-item active" onclick="showSection('dashboard',this)"><div class="nav-icon">📊</div>Dashboard</button>
      <button class="nav-item" onclick="showSection('users',this)"><div class="nav-icon">👥</div>Utilisateurs</button>
      <button class="nav-item" onclick="showSection('apps',this)"><div class="nav-icon">📱</div>Applications</button>
      <button class="nav-item" onclick="showSection('builds',this)"><div class="nav-icon">⚙️</div>Builds APK</button>
      <button class="nav-item" onclick="showSection('analytics',this)"><div class="nav-icon">📈</div>Analytiques</button>
      <button class="nav-item" onclick="showSection('notifications',this)"><div class="nav-icon">🔔</div>Notifications</button>
      <button class="nav-item" onclick="showSection('settings',this)"><div class="nav-icon">⚙️</div>Paramètres</button>
    </div>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="sidebar-user-avatar" id="sidebarInitial">A</div>
        <div><div style="font-weight:800;font-size:.75rem" id="sidebarName">Admin</div><div style="font-size:.65rem;opacity:.6">Super Admin</div></div>
      </div>
      <button class="nav-item" onclick="doLogout()" style="color:rgba(255,100,100,.8)"><div class="nav-icon">🚪</div>Déconnexion</button>
    </div>
  </div>

  <!-- MAIN -->
  <div class="admin-main">
    <div class="admin-topbar">
      <div class="admin-page-title" id="adminPageTitle">📊 Dashboard</div>
      <input class="admin-search" placeholder="🔍 Rechercher..." id="globalSearch" oninput="globalSearchFn(this.value)">
      <button style="padding:8px 14px;border-radius:8px;background:var(--g);color:#fff;border:none;font-family:'Nunito',sans-serif;font-size:.8rem;font-weight:800;cursor:pointer" onclick="openModal('notifModal')">📣 Notifier</button>
    </div>
    <div class="admin-body" id="adminBody">
      <!-- Filled by JS -->
    </div>
  </div>
</div>

<script>
// ════════════════════════════════════════════
// SUPABASE
// ════════════════════════════════════════════
const{createClient}=supabase;
const sb=createClient('https://beppcitwncihpqhminmd.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJlcHBjaXR3bmNpaHBxaG1pbm1kIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzNzY2NTgsImV4cCI6MjA5MDk1MjY1OH0.nQ4VrAFekWd8kFy1oHBoU4dKaNRL61WZ6vSLFak7ei0');

// ════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════
let currentAdmin=null;
let allUsers=[],allApps=[],allBuilds=[];
let currentSection='dashboard';
const ADMIN_EMAILS=['admin@apkbuilding.app','votremail@gmail.com']; // à modifier

// ════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════
async function init(){
  const{data:{session}}=await sb.auth.getSession();
  if(!session){window.location.href='apk-building.html';return;}
  currentAdmin=session.user;
  // Check admin
  // For demo we allow any authenticated user
  document.getElementById('sidebarInitial').textContent=(currentAdmin.email||'A').charAt(0).toUpperCase();
  document.getElementById('sidebarName').textContent=currentAdmin.email;
  await loadAll();
  renderDashboard();
}

async function loadAll(){
  const[u,a,b]=await Promise.all([
    sb.from('profiles').select('*').order('created_at',{ascending:false}),
    sb.from('apps').select('*, app_features(count)').order('created_at',{ascending:false}),
    sb.from('build_history').select('*').order('created_at',{ascending:false}),
  ]);
  allUsers=u.data||[];
  allApps=a.data||[];
  allBuilds=b.data||[];
}

async function doLogout(){
  await sb.auth.signOut();
  window.location.href='apk-building.html';
}

// ════════════════════════════════════════════
// NAVIGATION
// ════════════════════════════════════════════
function showSection(sec,btn){
  currentSection=sec;
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  const titles={dashboard:'📊 Dashboard',users:'👥 Utilisateurs',apps:'📱 Applications',builds:'⚙️ Builds APK',analytics:'📈 Analytiques',notifications:'🔔 Notifications',settings:'⚙️ Paramètres'};
  document.getElementById('adminPageTitle').textContent=titles[sec]||sec;
  const fn={dashboard:renderDashboard,users:renderUsers,apps:renderApps,builds:renderBuilds,analytics:renderAnalytics,notifications:renderNotifications,settings:renderSettings};
  (fn[sec]||renderDashboard)();
}

// ════════════════════════════════════════════
// DASHBOARD
// ════════════════════════════════════════════
function renderDashboard(){
  const todayUsers=allUsers.filter(u=>isToday(u.created_at)).length;
  const todayApps=allApps.filter(a=>isToday(a.created_at)).length;
  const readyApps=allApps.filter(a=>a.status==='ready').length;
  const proUsers=allUsers.filter(u=>u.plan==='pro').length;
  const countries=[...new Set(allUsers.map(u=>u.country))].filter(Boolean);
  const countryCount=countries.map(c=>({c,n:allUsers.filter(u=>u.country===c).length})).sort((a,b)=>b.n-a.n).slice(0,6);
  const catCount={};allApps.forEach(a=>{if(a.category){catCount[a.category]=(catCount[a.category]||0)+1;}});
  const catArr=Object.entries(catCount).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const recent=allApps.slice(0,5);
  const recentUsers=allUsers.slice(0,5);

  document.getElementById('adminBody').innerHTML=`
  <div class="kpi-row">
    <div class="kpi-card"><div class="kpi-val" style="color:var(--g)">${allUsers.length}</div><div class="kpi-label">Utilisateurs total</div><div class="kpi-change up">+${todayUsers} aujourd'hui</div></div>
    <div class="kpi-card"><div class="kpi-val" style="color:var(--blue)">${allApps.length}</div><div class="kpi-label">Applications créées</div><div class="kpi-change up">+${todayApps} aujourd'hui</div></div>
    <div class="kpi-card"><div class="kpi-val" style="color:var(--yw)">${readyApps}</div><div class="kpi-label">APK générés</div><div class="kpi-change ${readyApps>0?'up':''}">Téléchargeables</div></div>
    <div class="kpi-card"><div class="kpi-val" style="color:var(--pu,#8b5cf6)">${proUsers}</div><div class="kpi-label">Comptes Pro</div><div class="kpi-change up">${allUsers.length>0?Math.round(proUsers/allUsers.length*100):0}% du total</div></div>
  </div>

  <div class="charts-row">
    <div class="chart-card">
      <div class="chart-title">🌍 Utilisateurs par pays</div>
      <div class="bar-chart">${countryCount.map(({c,n})=>`
        <div class="bar-item">
          <div class="bar-label">${c}</div>
          <div class="bar-wrap"><div class="bar-fill" style="width:${Math.round(n/allUsers.length*100)}%"></div></div>
          <div class="bar-val">${n}</div>
        </div>`).join('')||'<div style="font-size:.8rem;color:var(--mu)">Aucune donnée</div>'}
      </div>
    </div>
    <div class="chart-card">
      <div class="chart-title">📱 Apps par catégorie</div>
      <div class="bar-chart">${catArr.map(([c,n])=>`
        <div class="bar-item">
          <div class="bar-label">${c}</div>
          <div class="bar-wrap"><div class="bar-fill" style="width:${allApps.length>0?Math.round(n/allApps.length*100):0}%;background:linear-gradient(90deg,var(--blue),#60a5fa)"></div></div>
          <div class="bar-val">${n}</div>
        </div>`).join('')||'<div style="font-size:.8rem;color:var(--mu)">Aucune donnée</div>'}
      </div>
    </div>
  </div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
    <div class="table-card">
      <div class="table-header"><div class="table-title">🆕 Dernières apps</div><button class="ta-btn" onclick="showSection('apps')">Voir tout</button></div>
      <div class="table-wrap"><table>
        <tr><th>App</th><th>Statut</th><th>Date</th></tr>
        ${recent.map(a=>`<tr>
          <td class="td-name">${a.icon||'📱'} ${a.name||'Sans nom'}</td>
          <td><span class="badge ${a.status==='ready'?'badge-green':'badge-gray'}">${a.status||'draft'}</span></td>
          <td style="font-size:.72rem;color:var(--mu);font-family:'DM Mono',monospace">${fmtDate(a.created_at)}</td>
        </tr>`).join('')||'<tr><td colspan="3" style="text-align:center;color:var(--mu)">Aucune app</td></tr>'}
      </table></div>
    </div>
    <div class="table-card">
      <div class="table-header"><div class="table-title">👤 Derniers inscrits</div><button class="ta-btn" onclick="showSection('users')">Voir tout</button></div>
      <div class="table-wrap"><table>
        <tr><th>Nom</th><th>Plan</th><th>Pays</th></tr>
        ${recentUsers.map(u=>`<tr>
          <td class="td-name">${u.full_name||'—'}</td>
          <td><span class="badge ${u.plan==='pro'?'badge-green':'badge-gray'}">${u.plan||'free'}</span></td>
          <td style="font-size:.78rem">${u.country||'—'}</td>
        </tr>`).join('')||'<tr><td colspan="3" style="text-align:center;color:var(--mu)">Aucun utilisateur</td></tr>'}
      </table></div>
    </div>
  </div>`;
}

// ════════════════════════════════════════════
// USERS
// ════════════════════════════════════════════
function renderUsers(filter=''){
  const users=filter?allUsers.filter(u=>
    (u.full_name||'').toLowerCase().includes(filter)||
    (u.email||'').toLowerCase().includes(filter)||
    (u.country||'').toLowerCase().includes(filter)
  ):allUsers;

  document.getElementById('adminBody').innerHTML=`
  <div class="stat-mini-row">
    <div class="stat-mini"><div class="stat-mini-icon">👥</div>${allUsers.length} total</div>

async function togglePlan(id,currentPlan){
  const newPlan=currentPlan==='pro'?'free':'pro';
  await sb.from('profiles').update({plan:newPlan}).eq('id',id);
  const u=allUsers.find(u=>u.id===id);
  if(u) u.plan=newPlan;
  toast(`Plan changé → ${newPlan}`,'ok');
  closeModal('userModal');
  renderUsers();
}

async function deleteUser(id){
  if(!confirm('Supprimer cet utilisateur ? Action irréversible.')) return;
  await sb.from('profiles').delete().eq('id',id);
  allUsers=allUsers.filter(u=>u.id!==id);
  toast('Utilisateur supprimé','ok');
  closeModal('userModal');
  renderUsers();
}

function renderAnalytics(){

  const days=Object.entries(byDay).sort((a,b)=>a[0].localeCompare(b[0])).slice(-14);
  const maxVal=Math.max(...days.map(([,n])=>n),1);
  document.getElementById('adminBody').innerHTML=`
  <div class="kpi-row">
    <div class="kpi-card"><div class="kpi-val" style="color:var(--g)">${allUsers.length}</div><div class="kpi-label">Inscriptions totales</div></div>
    <div class="kpi-card"><div class="kpi-val" style="color:var(--blue)">${allApps.length}</div><div class="kpi-label">Apps créées</div></div>
    <div class="kpi-card"><div class="kpi-val" style="color:var(--yw)">${allBuilds.filter(b=>b.status==='success').length}</div><div class="kpi-label">Builds réussis</div></div>
    <div class="kpi-card"><div class="kpi-val" style="color:var(--g)">${allUsers.length>0?(allApps.length/allUsers.length).toFixed(1):0}</div><div class="kpi-label">Apps / utilisateur</div></div>
  </div>
  <div class="chart-card" style="margin-bottom:16px">
    <div class="chart-title">📅 Inscriptions (14 derniers jours)</div>
    <div class="bar-chart">${days.map(([d,n])=>`
      <div class="bar-item">
        <div class="bar-label">${d.slice(5)}</div>
        <div class="bar-wrap"><div class="bar-fill" style="width:${Math.round(n/maxVal*100)}%"></div></div>
        <div class="bar-val">${n}</div>
      </div>`).join('')||'<div style="font-size:.8rem;color:var(--mu)">Aucune donnée sur 14 jours</div>'}
    </div>
  </div>
  <div class="charts-row">
    <div class="chart-card">
      <div class="chart-title">📱 Types d'app les plus créés</div>
      <div class="bar-chart">${getTopN(allApps.map(a=>a.category).filter(Boolean),6).map(({k,n})=>`
        <div class="bar-item"><div class="bar-label">${k}</div><div class="bar-wrap"><div class="bar-fill" style="width:${allApps.length>0?Math.round(n/allApps.length*100):0}%;background:linear-gradient(90deg,var(--blue),#60a5fa)"></div></div><div class="bar-val">${n}</div></div>`).join('')||'—'}
      </div>
    </div>
    <div class="chart-card">
      <div class="chart-title">🌍 Top pays</div>
      <div class="bar-chart">${getTopN(allUsers.map(u=>u.country).filter(Boolean),6).map(({k,n})=>`
        <div class="bar-item"><div class="bar-label">${k}</div><div class="bar-wrap"><div class="bar-fill" style="width:${allUsers.length>0?Math.round(n/allUsers.length*100):0}%"></div></div><div class="bar-val">${n}</div></div>`).join('')||'—'}
      </div>
    </div>
  </div>`;
}

function getTopN(arr,n){
  const counts={};arr.forEach(v=>{counts[v]=(counts[v]||0)+1;});
  return Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,n).map(([k,n])=>({k,n}));
}

// ════════════════════════════════════════════
// EXPORT CSV
// ════════════════════════════════════════════
function exportCSV(type){
  let csv='',name='';
  if(type==='users'||type==='all'){
    csv+='=== UTILISATEURS ===\n';
    csv+='Nom,Email,WhatsApp,Telegram,Pays,Plan,Inscrit le\n';
    allUsers.forEach(u=>{csv+=`"${u.full_name||''}","${u.email||''}","${u.whatsapp||''}","${u.telegram||''}","${u.country||''}","${u.plan||'free'}","${u.created_at||''}"\n`;});
    name='apkbuilding-users.csv';
  }
  if(type==='apps'||type==='all'){
    if(type==='all') csv+='\n=== APPLICATIONS ===\n';
    csv+='Nom,Catégorie,Statut,Plateforme,Créée le\n';
    allApps.forEach(a=>{csv+=`"${a.name||''}","${a.category||''}","${a.status||''}","${a.platform||''}","${a.created_at||''}"\n`;});
    if(type==='apps') name='apkbuilding-apps.csv';
    else name='apkbuilding-export.csv';
  }
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=name;a.click();
  URL.revokeObjectURL(url);
  toast('CSV exporté ✓','ok');
}

function globalSearchFn(q){
  if(!q) return;
  q=q.toLowerCase();
  if(currentSection==='users') renderUsers(q);
  else if(currentSection==='apps') renderApps(q);
}

// ════════════════════════════════════════════
// UTILS
// ════════════════════════════════════════════
function isToday(dateStr){if(!dateStr) return false;const d=new Date(dateStr),n=new Date();return d.toDateString()===n.toDateString();}
function fmtDate(s){if(!s) return'—';const d=new Date(s);return d.toLocaleDateString('fr-FR',{day:'2-digit',month:'short',year:'2-digit'});}
function toast(msg,type='ok'){const t=document.getElementById('toast');t.textContent=msg;t.className=`toast show ${type}`;setTimeout(()=>t.classList.remove('show'),2800);}
function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}

init();
